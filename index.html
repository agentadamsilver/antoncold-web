<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anton Cold</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
    }

    .container {
      text-align: center;
    }

    #text {
      color: #00ff41;
      font-size: clamp(1.2rem, 4vw, 2.4rem);
      letter-spacing: 0.08em;
      text-shadow:
        0 0 4px #00ff41,
        0 0 12px #00ff4180,
        0 0 30px #00ff4130;
      white-space: nowrap;
    }

    #cursor {
      display: inline-block;
      width: 0.55em;
      height: 1.1em;
      background: #00ff41;
      vertical-align: text-bottom;
      margin-left: 3px;
      box-shadow: 0 0 8px #00ff41, 0 0 20px #00ff4160;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* subtle scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.08) 3px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <span id="text"></span><span id="cursor"></span>
  </div>

  <script>
    const MESSAGE   = "Welcome home, Anton Cold";
    const TYPE_SPEED  = 75;   // ms per character (with jitter)
    const TYPE_JITTER = 45;   // ms random added per char
    const HOLD_MS     = 2800; // pause after fully typed
    const ERASE_SPEED = 35;   // ms per character erased
    const RESTART_MS  = 600;  // pause before retyping

    const el = document.getElementById("text");
    let pos = 0;

    function type() {
      if (pos < MESSAGE.length) {
        el.textContent += MESSAGE[pos++];
        setTimeout(type, TYPE_SPEED + Math.random() * TYPE_JITTER);
      } else {
        setTimeout(erase, HOLD_MS);
      }
    }

    function erase() {
      if (el.textContent.length > 0) {
        el.textContent = el.textContent.slice(0, -1);
        setTimeout(erase, ERASE_SPEED);
      } else {
        pos = 0;
        setTimeout(type, RESTART_MS);
      }
    }

    type();
  </script>
</body>
</html>
